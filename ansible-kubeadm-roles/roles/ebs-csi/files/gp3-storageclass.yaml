apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3

provisioner: ebs.csi.aws.com

parameters:
  type: gp3
  fsType: ext4
  
  tagSpecification_1: "Name=db-data"
  tagSpecification_2: "Environment=prod"
  tagSpecification_3: "Application=openemr"


allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer