---
- name: Deploy Production Ingress Stack for OpenEMR
  hosts: controlplane
  become: true

  vars:

    kubeconfig_path: /etc/kubernetes/admin.conf

    openemr_namespace: openemr

    domain_name: us.mitz.shop

    cert_manager_namespace: cert-manager

    ingress_namespace: ingress-nginx

    letsencrypt_email: admin@mitz.shop

  tasks:

    # =========================================================================
    # Install Required Packages
    # =========================================================================

    - name: Install curl
      package:
        name: curl
        state: present

    # =========================================================================
    # Install Helm
    # =========================================================================

    - name: Check Helm installation
      stat:
        path: /usr/local/bin/helm
      register: helm_binary

    - name: Install Helm
      shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      when: not helm_binary.stat.exists

    # =========================================================================
    # Add Helm Repositories
    # =========================================================================

    - name: Add ingress-nginx Helm repository
      command: >
        helm repo add ingress-nginx
        https://kubernetes.github.io/ingress-nginx

    - name: Add Jetstack Helm repository
      command: >
        helm repo add jetstack
        https://charts.jetstack.io

    - name: Update Helm repositories
      command: helm repo update

    # =========================================================================
    # Install ingress-nginx
    # =========================================================================

    - name: Create ingress-nginx values file
      copy:
        dest: /tmp/ingress-nginx-values.yaml
        content: |
          controller:

            replicaCount: 2

            ingressClassResource:
              name: nginx
              enabled: true
              default: true

            service:

              type: LoadBalancer

              externalTrafficPolicy: Local

              annotations:

                service.beta.kubernetes.io/aws-load-balancer-type: "nlb"

                service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"

                service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"

                service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "instance"

                service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"

            config:

              proxy-body-size: "256m"

              proxy-read-timeout: "600"

              proxy-send-timeout: "600"

              use-forwarded-headers: "true"

              compute-full-forwarded-for: "true"

    - name: Install ingress-nginx
      command: >
        helm upgrade --install ingress-nginx
        ingress-nginx/ingress-nginx
        --namespace {{ ingress_namespace }}
        --create-namespace
        -f /tmp/ingress-nginx-values.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    # =========================================================================
    # Wait for ingress-nginx
    # =========================================================================

    - name: Wait for ingress-nginx controller deployment
      command: >
        kubectl rollout status deployment/ingress-nginx-controller
        -n {{ ingress_namespace }}
        --timeout=600s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    # =========================================================================
    # Show NLB Endpoint
    # =========================================================================

    - name: Get ingress-nginx LoadBalancer hostname
      shell: >
        kubectl get svc ingress-nginx-controller
        -n {{ ingress_namespace }}
        -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
      register: ingress_hostname
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Show DNS configuration
      debug:
        msg:
          - "======================================="
          - "Configure DNS Before Continuing"
          - "======================================="
          - "Create DNS record:"
          - "{{ domain_name }} -> {{ ingress_hostname.stdout }}"
          - "======================================="

    # =========================================================================
    # Install cert-manager CRDs
    # =========================================================================

    - name: Install cert-manager CRDs
      command: >
        kubectl apply -f
        https://github.com/cert-manager/cert-manager/releases/download/v1.18.2/cert-manager.crds.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    # =========================================================================
    # Install cert-manager
    # =========================================================================

    - name: Install cert-manager
      command: >
        helm upgrade --install cert-manager
        jetstack/cert-manager
        --namespace {{ cert_manager_namespace }}
        --create-namespace
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    # =========================================================================
    # Wait for cert-manager
    # =========================================================================

    - name: Wait for cert-manager deployment
      command: >
        kubectl rollout status deployment/cert-manager
        -n {{ cert_manager_namespace }}
        --timeout=600s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Wait for cert-manager-webhook deployment
      command: >
        kubectl rollout status deployment/cert-manager-webhook
        -n {{ cert_manager_namespace }}
        --timeout=600s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Wait for cert-manager-cainjector deployment
      command: >
        kubectl rollout status deployment/cert-manager-cainjector
        -n {{ cert_manager_namespace }}
        --timeout=600s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    # =========================================================================
    # Create ClusterIssuer
    # =========================================================================

    - name: Create ClusterIssuer manifest
      copy:
        dest: /tmp/clusterissuer.yaml
        content: |
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer

          metadata:
            name: letsencrypt-prod

          spec:

            acme:

              email: {{ letsencrypt_email }}

              server: https://acme-v02.api.letsencrypt.org/directory

              privateKeySecretRef:
                name: letsencrypt-prod

              solvers:

                - http01:

                    ingress:
                      class: nginx

    - name: Apply ClusterIssuer
      command: kubectl apply -f /tmp/clusterissuer.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    # =========================================================================
    # Wait for ClusterIssuer
    # =========================================================================

    - name: Wait for ClusterIssuer readiness
      shell: >
        kubectl get clusterissuer letsencrypt-prod
        -o jsonpath='{.status.conditions[0].status}'
      register: issuer_status
      retries: 20
      delay: 15
      until: issuer_status.stdout == "True"
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    # =========================================================================
    # Create OpenEMR HTTPS Ingress
    # =========================================================================

    - name: Create OpenEMR HTTPS ingress manifest
      copy:
        dest: /tmp/openemr-ingress.yaml
        content: |
          apiVersion: networking.k8s.io/v1
          kind: Ingress

          metadata:
            name: openemr
            namespace: {{ openemr_namespace }}

            annotations:

              cert-manager.io/cluster-issuer: letsencrypt-prod

              nginx.ingress.kubernetes.io/proxy-body-size: "256m"

              nginx.ingress.kubernetes.io/ssl-redirect: "true"

              nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

              nginx.ingress.kubernetes.io/backend-protocol: "HTTP"

              nginx.ingress.kubernetes.io/proxy-read-timeout: "600"

              nginx.ingress.kubernetes.io/proxy-send-timeout: "600"

          spec:

            ingressClassName: nginx

            tls:
              - hosts:
                  - {{ domain_name }}

                secretName: openemr-tls

            rules:

              - host: {{ domain_name }}

                http:

                  paths:

                    - path: /
                      pathType: Prefix

                      backend:
                        service:
                          name: openemr

                          port:
                            number: 80

    - name: Apply OpenEMR ingress
      command: kubectl apply -f /tmp/openemr-ingress.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    # =========================================================================
    # Wait for TLS Secret
    # =========================================================================

    - name: Wait for TLS secret creation
      command: >
        kubectl get secret openemr-tls
        -n {{ openemr_namespace }}
      register: tls_secret
      retries: 30
      delay: 20
      until: tls_secret.rc == 0
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    # =========================================================================
    # Final Output
    # =========================================================================

    - name: Show HTTPS endpoint
      debug:
        msg:
          - "======================================="
          - "Production OpenEMR HTTPS Endpoint"
          - "======================================="
          - "URL: https://{{ domain_name }}"
          - "======================================="