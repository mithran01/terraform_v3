---
- name: Deploy Redis on Kubernetes
  hosts: controlplane
  become: true

  vars:

    # -------------------------------------------------------------------------
    # Kubernetes
    # -------------------------------------------------------------------------

    namespace: openemr

    kubeconfig_path: /etc/kubernetes/admin.conf

    # -------------------------------------------------------------------------
    # Redis
    # -------------------------------------------------------------------------

    redis_image: redis:8-alpine

    redis_max_memory: 256mb

    redis_max_memory_policy: allkeys-lru

  tasks:

    # -------------------------------------------------------------------------
    # Redis Deployment
    # -------------------------------------------------------------------------

    - name: Create Redis Deployment manifest
      copy:
        dest: /tmp/redis-deployment.yaml
        content: |
          apiVersion: apps/v1
          kind: Deployment

          metadata:
            name: redis
            namespace: {{ namespace }}

            labels:
              app: redis
              app.kubernetes.io/name: redis
              app.kubernetes.io/component: cache
              app.kubernetes.io/part-of: openemr

          spec:
            replicas: 1

            selector:
              matchLabels:
                app: redis

            template:
              metadata:
                labels:
                  app: redis
                  app.kubernetes.io/name: redis
                  app.kubernetes.io/component: cache
                  app.kubernetes.io/part-of: openemr

              spec:
                containers:

                  - name: redis

                    image: {{ redis_image }}

                    imagePullPolicy: IfNotPresent

                    command:
                      - redis-server
                      - --save
                      - ""
                      - --appendonly
                      - "no"
                      - --maxmemory
                      - "{{ redis_max_memory }}"
                      - --maxmemory-policy
                      - "{{ redis_max_memory_policy }}"

                    ports:
                      - containerPort: 6379
                        name: redis

                    resources:
                      requests:
                        memory: "128Mi"
                        cpu: "100m"

                      limits:
                        memory: "512Mi"
                        cpu: "500m"

                    livenessProbe:
                      tcpSocket:
                        port: 6379

                      initialDelaySeconds: 10
                      periodSeconds: 10

                    readinessProbe:
                      tcpSocket:
                        port: 6379

                      initialDelaySeconds: 5
                      periodSeconds: 5

                    securityContext:
                      allowPrivilegeEscalation: false

                      capabilities:
                        drop:
                          - ALL

                      seccompProfile:
                        type: RuntimeDefault

    - name: Apply Redis Deployment
      command: kubectl apply -f /tmp/redis-deployment.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    # -------------------------------------------------------------------------
    # Redis Service
    # -------------------------------------------------------------------------

    - name: Create Redis Service manifest
      copy:
        dest: /tmp/redis-service.yaml
        content: |
          apiVersion: v1
          kind: Service

          metadata:
            name: redis
            namespace: {{ namespace }}

            labels:
              app: redis
              app.kubernetes.io/name: redis
              app.kubernetes.io/component: cache
              app.kubernetes.io/part-of: openemr

          spec:
            selector:
              app: redis

            ports:
              - name: redis
                port: 6379
                targetPort: 6379

            type: ClusterIP

    - name: Apply Redis Service
      command: kubectl apply -f /tmp/redis-service.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    # -------------------------------------------------------------------------
    # Verify Redis
    # -------------------------------------------------------------------------

    - name: Wait for Redis Pod
      command: >
        kubectl rollout status deployment/redis
        -n {{ namespace }}
        --timeout=180s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Get Redis Pods
      command: kubectl get pods -n {{ namespace }}
      register: redis_pods
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Show Redis Pods
      debug:
        var: redis_pods.stdout

    - name: Get Redis Service
      command: kubectl get svc redis -n {{ namespace }}
      register: redis_service
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Show Redis Service
      debug:
        var: redis_service.stdout