name: ANSIBLE + CONTROL PLANE

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform_env:
    runs-on: ubuntu-latest

    env:
      TF_VAR_ansible_plane_key: ${{ secrets.DEMOV1 }}
      TF_VAR_control_plane_key: ${{ secrets.DEMOV2 }}

    steps:

      - name: Git checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.14.9

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Create ansible master private key
        run: |
          echo "${{ secrets.DEMOV1 }}" > demov1.pem
          chmod 400 demov1.pem

      - name: Create worker ssh private key
        run: |
          echo "${{ secrets.DEMOV2 }}" > demov2.pem
          chmod 400 demov2.pem

      # ---------------------------------------------------------
      # ANSIBLE SERVER
      # ---------------------------------------------------------

      - name: Terraform Init - ansible-plane
        working-directory: terraform_v3/ansible-plane
        run: terraform init

      - name: Terraform Format Check - ansible-plane
        working-directory: terraform_v3/ansible-plane
        run: terraform fmt -check

      - name: Terraform Validate - ansible-plane
        working-directory: terraform_v3/ansible-plane
        run: terraform validate

      - name: Terraform Plan - ansible-plane
        working-directory: terraform_v3/ansible-plane
        run: terraform plan

      - name: Terraform Apply - ansible-plane
        working-directory: terraform_v3/ansible-plane
        run: terraform apply -auto-approve

      # ---------------------------------------------------------
      # CONTROL PLANE
      # ---------------------------------------------------------

      - name: Terraform Init - control-plane
        working-directory: terraform_v3/control-plane
        run: terraform init

      - name: Terraform Format Check - control-plane
        working-directory: terraform_v3/control-plane
        run: terraform fmt -check

      - name: Terraform Validate - control-plane
        working-directory: terraform_v3/control-plane
        run: terraform validate

      - name: Terraform Plan - control-plane
        working-directory: terraform_v3/control-plane
        run: terraform plan

      - name: Terraform Apply - control-plane
        working-directory: terraform_v3/control-plane
        run: terraform apply -auto-approve