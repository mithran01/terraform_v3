name: bootstrap pipeline

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform_env:
    runs-on: ubuntu-latest

    env:
      TF_VAR_ansible_plane_key: ${{ secrets.DEMOV1 }}
      TF_VAR_control_plane_key: ${{ secrets.DEMOV2_PUB }}

    steps:

      # ---------------------------------------------------------
      # GIT CHECKOUT
      # ---------------------------------------------------------

      - name: Git checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # TERRAFORM SETUP
      # ---------------------------------------------------------

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.14.9

      # ---------------------------------------------------------
      # AWS AUTH
      # ---------------------------------------------------------

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # ---------------------------------------------------------
      # SSH KEYS
      # ---------------------------------------------------------

      - name: Create ansible master private key
        run: |
          echo "${{ secrets.DEMOV1 }}" > demov1.pem
          chmod 400 demov1.pem

      - name: Create worker ssh private key
        run: |
          echo "${{ secrets.DEMOV2_PRI }}" > demov2.pem
          chmod 400 demov2.pem

      # ---------------------------------------------------------
      # TERRAFORM
      # ---------------------------------------------------------

      - name: Terraform Init
        working-directory: bootstrap
        run: terraform init

      - name: Terraform Format Check
        working-directory: bootstrap
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: bootstrap
        run: terraform validate

      - name: Terraform Plan
        working-directory: bootstrap
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: bootstrap
        run: terraform apply -auto-approve tfplan