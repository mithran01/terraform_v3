name: bootstrap pipeline

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform_env:
    runs-on: ubuntu-latest

    env:
      TF_VAR_ansible_plane_key: ${{ secrets.DEMOV1 }}
      TF_VAR_control_plane_key: ${{ secrets.DEMOV2_PUB }}

    steps:

      # ---------------------------------------------------------
      # GIT CHECKOUT
      # ---------------------------------------------------------

      - name: Git checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # TERRAFORM SETUP
      # ---------------------------------------------------------

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.14.9

      # ---------------------------------------------------------
      # AWS AUTH
      # ---------------------------------------------------------

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # ---------------------------------------------------------
      # SSH KEYS
      # ---------------------------------------------------------

      - name: Create ansible master private key
        run: |
          echo "${{ secrets.DEMOV1 }}" > demov1.pem
          chmod 400 demov1.pem

      - name: Create worker ssh private key
        run: |
          echo "${{ secrets.DEMOV2_PRI }}" > demov2.pem
          chmod 400 demov2.pem

      # ---------------------------------------------------------
      # TERRAFORM
      # ---------------------------------------------------------

      - name: Terraform Init
        working-directory: bootstrap
        run: terraform init

      - name: Terraform Format Check
        working-directory: bootstrap
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: bootstrap
        run: terraform validate

      - name: Terraform Plan
        working-directory: bootstrap
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: bootstrap
        run: terraform apply -auto-approve tfplan

      # ---------------------------------------------------------
      # GET TERRAFORM OUTPUTS
      # ---------------------------------------------------------

      - name: Get Terraform Outputs
        id: terraform_outputs
        working-directory: bootstrap
        run: |
          echo "ansible_ip=$(terraform output -raw ansible_plane_public_ips)" >> $GITHUB_OUTPUT
          echo "control_plane_ip=$(terraform output -raw control_plane_private_ips)" >> $GITHUB_OUTPUT
          echo "ansible_instance_id=$(terraform output -raw ansible_plane_instance_id)" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------
      # WAIT FOR EC2 RUNNING
      # ---------------------------------------------------------

      - name: Wait for EC2 running state
        run: |
          aws ec2 wait instance-running \
            --instance-ids ${{ steps.terraform_outputs.outputs.ansible_instance_id }}

      # ---------------------------------------------------------
      # WAIT FOR EC2 STATUS CHECKS
      # ---------------------------------------------------------

      - name: Wait for EC2 status checks
        run: |
          aws ec2 wait instance-status-ok \
            --instance-ids ${{ steps.terraform_outputs.outputs.ansible_instance_id }}

      # ---------------------------------------------------------
      # WAIT FOR SSH
      # ---------------------------------------------------------

      - name: Wait for SSH
        run: |
          until ssh \
            -o StrictHostKeyChecking=no \
            -i demov1.pem \
            ec2-user@${{ steps.terraform_outputs.outputs.ansible_ip }} \
            "echo SSH_READY"
          do
            echo "Waiting for SSH..."
            sleep 10
          done

      # ---------------------------------------------------------
      # WAIT FOR CLOUD INIT
      # ---------------------------------------------------------

      - name: Wait for cloud-init
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -i demov1.pem \
            ec2-user@${{ steps.terraform_outputs.outputs.ansible_ip }} \
            "sudo cloud-init status --wait"

      # ---------------------------------------------------------
      # COPY ANSIBLE REPOSITORY
      # ---------------------------------------------------------

      - name: Copy ansible repository
        run: |
          scp \
            -o StrictHostKeyChecking=no \
            -i demov1.pem \
            -r ansible-kubeadm-roles \
            ec2-user@${{ steps.terraform_outputs.outputs.ansible_ip }}:/home/ec2-user/

      # ---------------------------------------------------------
      # RUN KUBERNETES PLAYBOOK
      # ---------------------------------------------------------

      - name: Run Kubernetes Playbook
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -i demov1.pem \
            ec2-user@${{ steps.terraform_outputs.outputs.ansible_ip }} \
            "
              cd /home/ec2-user/ansible-kubeadm-roles && \
              ANSIBLE_ROLES_PATH=./roles \
              ansible-playbook \
              -i /etc/ansible/hosts \
              playbooks/kubernetes.yaml
            "